<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Fewer organisations say their quality strategy is effective</title>
  <desc id="desc">Economist-style editorial chart showing the share of organisations reporting an effective quality strategy falling from 23 percent in 2023 to 19 percent in 2025.</desc>

  <rect width="1200" height="720" fill="#f3efe4"/>
  <rect x="22" y="18" width="84" height="18" fill="#e3120b"/>

  <text x="22" y="90" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#1f1f1f">Quality blurred</text>
  <text x="22" y="138" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600" fill="#2a2a2a">Share of organisations saying their quality</text>
  <text x="22" y="168" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600" fill="#2a2a2a">strategy is effective, %</text>

  <g transform="translate(0,6)">
    <line x1="120" y1="560" x2="1060" y2="560" stroke="#2f2f2f" stroke-width="2"/>

    <line x1="120" y1="484" x2="1060" y2="484" stroke="#d8d1c3" stroke-width="2"/>
    <line x1="120" y1="408" x2="1060" y2="408" stroke="#d8d1c3" stroke-width="2"/>
    <line x1="120" y1="332" x2="1060" y2="332" stroke="#d8d1c3" stroke-width="2"/>
    <line x1="120" y1="256" x2="1060" y2="256" stroke="#d8d1c3" stroke-width="2"/>
    <line x1="120" y1="180" x2="1060" y2="180" stroke="#d8d1c3" stroke-width="2"/>

    <text x="1082" y="566" font-family="Inter, Arial, sans-serif" font-size="16" fill="#2f2f2f">0</text>
    <text x="1082" y="490" font-family="Inter, Arial, sans-serif" font-size="16" fill="#6b675f">5</text>
    <text x="1082" y="414" font-family="Inter, Arial, sans-serif" font-size="16" fill="#6b675f">10</text>
    <text x="1082" y="338" font-family="Inter, Arial, sans-serif" font-size="16" fill="#6b675f">15</text>
    <text x="1082" y="262" font-family="Inter, Arial, sans-serif" font-size="16" fill="#6b675f">20</text>
    <text x="1082" y="186" font-family="Inter, Arial, sans-serif" font-size="16" fill="#6b675f">25</text>

    <rect x="250" y="210" width="220" height="350" fill="#b9b1a4"/>
    <rect x="650" y="271" width="220" height="289" fill="#e3120b"/>

    <text x="360" y="198" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="#1f1f1f">23</text>
    <text x="360" y="596" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#6b675f">2023</text>

    <text x="760" y="258" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="#1f1f1f">19</text>
    <text x="760" y="596" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#6b675f">2025</text>

    <path d="M470 228 C 560 208, 625 214, 650 294" fill="none" stroke="#1f1f1f" stroke-width="2.5"/>
    <text x="500" y="196" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#1f1f1f">Down 4 percentage points in two years</text>
  </g>
</svg>
