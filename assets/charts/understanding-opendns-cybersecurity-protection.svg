<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <rect width="800" height="400" fill="#fff"/>

  <!-- Title -->
  <text x="40" y="36" font-family="Merriweather, Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">DNS security: the first line that most ignore</text>
  <text x="40" y="56" font-size="12" fill="#666">Key enterprise DNS security metrics · %</text>

  <!-- Bar 1: Phishing reduction -->
  <text x="40" y="100" font-size="13" fill="#1a1a1a">Phishing reduction with DNS filtering (Forrester)</text>
  <rect x="40" y="110" width="600" height="32" fill="#e0e0e0" rx="2"/>
  <rect x="40" y="110" width="510" height="32" fill="#E3120B" rx="2"/>
  <text x="558" y="132" font-size="13" font-weight="700" fill="#1a1a1a">85%</text>

  <!-- Bar 2: DNS security CAGR -->
  <text x="40" y="175" font-size="13" fill="#1a1a1a">DNS security market CAGR through 2027 (Gartner)</text>
  <rect x="40" y="185" width="600" height="32" fill="#e0e0e0" rx="2"/>
  <rect x="40" y="185" width="150" height="32" fill="#555" rx="2"/>
  <text x="198" y="207" font-size="13" font-weight="700" fill="#1a1a1a">25%</text>

  <!-- Divider -->
  <line x1="40" y1="240" x2="760" y2="240" stroke="#ddd" stroke-width="1"/>

  <!-- Section: Gaps -->
  <text x="40" y="268" font-size="14" font-weight="600" fill="#1a1a1a">The blind spots</text>

  <!-- Bar 3: Adapted to encrypted DNS -->
  <text x="40" y="298" font-size="13" fill="#666">Adapted to encrypted DNS queries</text>
  <rect x="310" y="284" width="300" height="22" fill="#e0e0e0" rx="2"/>
  <rect x="310" y="284" width="45" height="22" fill="#E3120B" rx="2"/>
  <text x="363" y="300" font-size="12" font-weight="700" fill="#E3120B">15%</text>
  <text x="420" y="300" font-size="11" fill="#999">of 6,700 orgs surveyed</text>

  <!-- Bar 4: Algorithmically generated domain increase -->
  <text x="40" y="332" font-size="13" fill="#666">Algorithmic domain increase (CrowdStrike)</text>
  <rect x="310" y="318" width="300" height="22" fill="#e0e0e0" rx="2"/>
  <rect x="310" y="318" width="285" height="22" fill="#555" rx="2"/>
  <text x="603" y="334" font-size="12" font-weight="700" fill="#555">95%</text>
  <text x="640" y="334" font-size="11" fill="#999">↑ 2021–2023</text>

  <!-- Source -->
  <text x="40" y="388" font-size="10" fill="#999">Sources: Forrester, DNS Security: The Overlooked Enterprise Defence, 2023; Gartner, Market Guide for DNS Security, 2023; Cisco, Cybersecurity Readiness Index, 2023</text>
</svg>
