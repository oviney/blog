<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <rect width="800" height="400" fill="#fff"/>

  <!-- Title -->
  <text x="40" y="36" font-family="Merriweather, Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">The coverage-quality gap</text>
  <text x="40" y="56" font-size="12" fill="#666">Why high coverage does not mean high fault detection</text>

  <!-- Y axis -->
  <line x1="100" y1="80" x2="100" y2="310" stroke="#1a1a1a" stroke-width="1"/>
  <!-- X axis -->
  <line x1="100" y1="310" x2="720" y2="310" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="90" y="314" font-size="11" fill="#999" text-anchor="end">0%</text>
  <text x="90" y="268" font-size="11" fill="#999" text-anchor="end">25%</text>
  <line x1="98" y1="264" x2="720" y2="264" stroke="#f0f0f0" stroke-width="1"/>
  <text x="90" y="222" font-size="11" fill="#999" text-anchor="end">50%</text>
  <line x1="98" y1="218" x2="720" y2="218" stroke="#f0f0f0" stroke-width="1"/>
  <text x="90" y="176" font-size="11" fill="#999" text-anchor="end">75%</text>
  <line x1="98" y1="172" x2="720" y2="172" stroke="#f0f0f0" stroke-width="1"/>
  <text x="90" y="130" font-size="11" fill="#999" text-anchor="end">100%</text>
  <line x1="98" y1="126" x2="720" y2="126" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Paired bars: Line coverage vs. Mutation detection -->

  <!-- Group 1: 80% coverage target -->
  <rect x="140" y="163.2" width="60" height="146.8" fill="#555" rx="1"/>
  <text x="170" y="156" font-size="11" font-weight="700" fill="#555" text-anchor="middle">80%</text>
  <rect x="210" y="217.2" width="60" height="92.8" fill="#E3120B" rx="1"/>
  <text x="240" y="210" font-size="11" font-weight="700" fill="#E3120B" text-anchor="middle">50%</text>
  <text x="185" y="338" font-size="11" fill="#1a1a1a" text-anchor="middle">80% target</text>

  <!-- Group 2: 90% coverage target -->
  <rect x="330" y="144.8" width="60" height="165.2" fill="#555" rx="1"/>
  <text x="360" y="137" font-size="11" font-weight="700" fill="#555" text-anchor="middle">90%</text>
  <rect x="400" y="199.4" width="60" height="110.6" fill="#E3120B" rx="1"/>
  <text x="430" y="192" font-size="11" font-weight="700" fill="#E3120B" text-anchor="middle">60%</text>
  <text x="375" y="338" font-size="11" fill="#1a1a1a" text-anchor="middle">90% target</text>

  <!-- Group 3: 95% coverage target -->
  <rect x="520" y="126.4" width="60" height="183.6" fill="#555" rx="1"/>
  <text x="550" y="119" font-size="11" font-weight="700" fill="#555" text-anchor="middle">95%</text>
  <rect x="590" y="199.4" width="60" height="110.6" fill="#E3120B" rx="1"/>
  <text x="620" y="192" font-size="11" font-weight="700" fill="#E3120B" text-anchor="middle">60%</text>
  <text x="565" y="338" font-size="11" fill="#1a1a1a" text-anchor="middle">95% target</text>

  <!-- Gap annotation -->
  <line x1="660" y1="126" x2="660" y2="199" stroke="#E3120B" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="670" y="155" font-size="11" fill="#E3120B" font-style="italic">35-point</text>
  <text x="670" y="169" font-size="11" fill="#E3120B" font-style="italic">gap</text>

  <!-- Legend -->
  <rect x="40" y="360" width="12" height="12" fill="#555" rx="1"/>
  <text x="58" y="371" font-size="11" fill="#666">Line coverage achieved</text>
  <rect x="220" y="360" width="12" height="12" fill="#E3120B" rx="1"/>
  <text x="238" y="371" font-size="11" fill="#666">Mutation detection rate (Google)</text>

  <!-- Source -->
  <text x="40" y="388" font-size="10" fill="#999">Sources: Petrovic &amp; Ivankovic, State of Mutation Testing at Google, IEEE ICSE-SEIP, 2018; Inozemtseva &amp; Holmes, ICSE, 2014</text>
</svg>
