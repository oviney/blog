<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <rect width="800" height="400" fill="#fff"/>

  <!-- Title -->
  <text x="40" y="36" font-family="Merriweather, Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">The hidden cost of test automation debt</text>
  <text x="40" y="56" font-size="12" fill="#666">How QA teams actually spend their time · % of effort</text>

  <!-- Bar 1: QA time on maintenance -->
  <text x="40" y="100" font-size="13" fill="#1a1a1a">Test maintenance (not finding bugs)</text>
  <rect x="40" y="110" width="480" height="32" fill="#e0e0e0" rx="2"/>
  <rect x="40" y="110" width="288" height="32" fill="#E3120B" rx="2"/>
  <text x="336" y="132" font-size="13" font-weight="700" fill="#fff">40%</text>
  <text x="488" y="132" font-size="12" fill="#999">of QA capacity</text>

  <!-- Bar 2: Flaky test triage -->
  <text x="40" y="175" font-size="13" fill="#1a1a1a">Triaging flaky test failures</text>
  <rect x="40" y="185" width="480" height="32" fill="#e0e0e0" rx="2"/>
  <rect x="40" y="185" width="180" height="32" fill="#555" rx="2"/>
  <text x="228" y="207" font-size="13" font-weight="700" fill="#1a1a1a">20–30%</text>
  <text x="488" y="207" font-size="12" fill="#999">of QA work week</text>

  <!-- Divider -->
  <line x1="40" y1="240" x2="760" y2="240" stroke="#ddd" stroke-width="1"/>

  <!-- Section: Flakiness growth -->
  <text x="40" y="268" font-size="14" font-weight="600" fill="#1a1a1a">Teams with significant test flakiness</text>

  <!-- 2022 bar -->
  <text x="40" y="298" font-size="13" fill="#666">2022</text>
  <rect x="100" y="284" width="480" height="22" fill="#e0e0e0" rx="2"/>
  <rect x="100" y="284" width="48" height="22" fill="#888" rx="2"/>
  <text x="156" y="300" font-size="12" font-weight="700" fill="#888">10%</text>

  <!-- 2025 bar -->
  <text x="40" y="332" font-size="13" fill="#666">2025</text>
  <rect x="100" y="318" width="480" height="22" fill="#e0e0e0" rx="2"/>
  <rect x="100" y="318" width="125" height="22" fill="#E3120B" rx="2"/>
  <text x="233" y="334" font-size="12" font-weight="700" fill="#E3120B">26%</text>
  <text x="290" y="334" font-size="11" fill="#999">↑ 160% increase in 3 years</text>

  <!-- Source -->
  <text x="40" y="388" font-size="10" fill="#999">Sources: TestDino, Flaky Test Benchmark Report, 2026; Capgemini &amp; Sogeti, World Quality Report, 2025-26</text>
</svg>
