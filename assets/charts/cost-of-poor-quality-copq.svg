<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <rect width="800" height="400" fill="#fff"/>

  <!-- Title -->
  <text x="40" y="36" font-family="Merriweather, Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">The cost of poor quality: prevention vs. failure</text>
  <text x="40" y="56" font-size="12" fill="#666">Where quality spending actually goes</text>

  <!-- Bar 1: COPQ as share of revenue -->
  <text x="40" y="100" font-size="13" fill="#1a1a1a">COPQ as % of sales revenue (ASQ, manufacturing)</text>
  <rect x="40" y="110" width="600" height="32" fill="#e0e0e0" rx="2"/>
  <rect x="40" y="110" width="240" height="32" fill="#555" rx="2"/>
  <text x="288" y="132" font-size="13" font-weight="700" fill="#1a1a1a">15–40%</text>
  <text x="370" y="132" font-size="11" fill="#999">of total operations</text>

  <!-- Divider -->
  <line x1="40" y1="165" x2="760" y2="165" stroke="#ddd" stroke-width="1"/>

  <!-- Section: Software spending ratio -->
  <text x="40" y="193" font-size="14" font-weight="600" fill="#1a1a1a">Software's inverted spending (CISQ)</text>

  <!-- Prevention spending -->
  <text x="40" y="225" font-size="13" fill="#666">Spent on preventing defects</text>
  <rect x="300" y="211" width="400" height="26" fill="#e0e0e0" rx="2"/>
  <rect x="300" y="211" width="80" height="26" fill="#E3120B" rx="2"/>
  <text x="388" y="229" font-size="12" font-weight="700" fill="#E3120B">1×</text>

  <!-- Detection + failure spending -->
  <text x="40" y="259" font-size="13" fill="#666">Spent finding and fixing defects</text>
  <rect x="300" y="245" width="400" height="26" fill="#e0e0e0" rx="2"/>
  <rect x="300" y="245" width="272" height="26" fill="#555" rx="2"/>
  <text x="580" y="263" font-size="12" font-weight="700" fill="#555">3.4×</text>

  <!-- Annotation -->
  <text x="580" y="229" font-size="11" fill="#E3120B" font-style="italic">Software inverts the</text>
  <text x="580" y="243" font-size="11" fill="#E3120B" font-style="italic">manufacturing model</text>

  <!-- Total COPQ -->
  <line x1="40" y1="288" x2="760" y2="288" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="315" font-size="14" font-weight="600" fill="#1a1a1a">Total US software COPQ</text>
  <text x="300" y="315" font-size="18" font-weight="700" fill="#E3120B">$2.41 trillion</text>
  <text x="490" y="315" font-size="12" fill="#999">CISQ, 2022</text>

  <!-- Toyota comparison -->
  <text x="40" y="350" font-size="13" fill="#1a1a1a">Toyota COPQ (mature quality system): </text>
  <text x="340" y="350" font-size="13" font-weight="700" fill="#555">2–3%</text>
  <text x="395" y="350" font-size="13" fill="#666"> vs. immature: </text>
  <text x="510" y="350" font-size="13" font-weight="700" fill="#E3120B">15–25%</text>

  <!-- Source -->
  <text x="40" y="388" font-size="10" fill="#999">Sources: CISQ, Cost of Poor Software Quality in the US, 2022; ASQ, Cost of Poor Quality; Boeing SEC filings, 2024</text>
</svg>
