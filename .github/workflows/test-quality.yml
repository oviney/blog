name: Quality Tests (Visual, Accessibility, Performance, Security)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Nightly full-suite run at 02:00 UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Run full Playwright suite regardless of changed files'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ---------------------------------------------------------------------------
  # Step 1: Determine which tests to run based on changed files
  # ---------------------------------------------------------------------------
  select-tests:
    name: 🔍 Select Tests (change-based)
    runs-on: ubuntu-latest
    outputs:
      test_groups:      ${{ steps.select.outputs.test_groups }}
      full_suite:       ${{ steps.select.outputs.full_suite }}
      skip_playwright:  ${{ steps.select.outputs.skip_playwright }}
      playwright_grep:  ${{ steps.select.outputs.playwright_grep }}
      selection_reason: ${{ steps.select.outputs.selection_reason }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 for diff

      - name: Select test groups from diff
        id: select
        run: |
          # Force full suite on nightly cron or manual dispatch with full_suite=true
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "test_groups=ALL"             >> "$GITHUB_OUTPUT"
            echo "full_suite=true"             >> "$GITHUB_OUTPUT"
            echo "skip_playwright=false"       >> "$GITHUB_OUTPUT"
            echo "playwright_grep="            >> "$GITHUB_OUTPUT"
            echo "selection_reason=nightly scheduled run" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ inputs.full_suite }}" == "true" ]]; then
            echo "test_groups=ALL"             >> "$GITHUB_OUTPUT"
            echo "full_suite=true"             >> "$GITHUB_OUTPUT"
            echo "skip_playwright=false"       >> "$GITHUB_OUTPUT"
            echo "playwright_grep="            >> "$GITHUB_OUTPUT"
            echo "selection_reason=manual dispatch full_suite=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run the selection script and capture outputs
          bash scripts/select-tests.sh > /tmp/select_env.sh
          source /tmp/select_env.sh

          echo "test_groups=${TEST_GROUPS}"             >> "$GITHUB_OUTPUT"
          echo "full_suite=${FULL_SUITE}"               >> "$GITHUB_OUTPUT"
          echo "skip_playwright=${SKIP_PLAYWRIGHT}"     >> "$GITHUB_OUTPUT"
          echo "playwright_grep=${PLAYWRIGHT_GREP}"     >> "$GITHUB_OUTPUT"
          echo "selection_reason=${SELECTION_REASON}"   >> "$GITHUB_OUTPUT"

          echo "### 🔍 Test Selection" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Groups | \`${TEST_GROUPS}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Full suite | \`${FULL_SUITE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skip Playwright | \`${SKIP_PLAYWRIGHT}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Grep | \`${PLAYWRIGHT_GREP:-none}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason | ${SELECTION_REASON} |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Step 2: Content Validation (post quality checks)
  # ---------------------------------------------------------------------------
  content-validation:
    name: 📝 Content Validation
    runs-on: ubuntu-latest
    needs: select-tests
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate post quality
        run: |
          set +e
          bash scripts/validate-post-quality.sh
          rc=$?
          set -e
          if [ $rc -eq 2 ]; then
            echo "⚠️ Post quality warnings found (non-blocking)"
            exit 0
          fi
          exit $rc

  # ---------------------------------------------------------------------------
  # Step 3: Non-Playwright quality checks (always run unless CI-only change)
  # ---------------------------------------------------------------------------
  quality-checks:
    name: 🎯 Accessibility, Visual & Lighthouse
    runs-on: ubuntu-latest
    needs: select-tests
    if: needs.select-tests.outputs.skip_playwright != 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Start Jekyll server
        run: |
          bundle exec jekyll serve --port 4000 --detach
          echo "Waiting for Jekyll server to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:4000/ > /dev/null; then
              echo "Jekyll server is ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -f http://localhost:4000/ || { echo "Jekyll server failed to start"; exit 1; }

      - name: Run visual regression tests
        run: npm run test:visual
        continue-on-error: true

      - name: Run accessibility tests
        run: npm run test:a11y

      - name: Run Lighthouse CI
        run: npm run test:lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload visual regression report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: backstop_data/html_report/
          retention-days: 7

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Step 2b: Security audit (always run)
  # ---------------------------------------------------------------------------
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: select-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm run test:security

  # ---------------------------------------------------------------------------
  # Step 3: Playwright — Partial run (change-based, single job)
  # ---------------------------------------------------------------------------
  playwright-partial:
    name: 🎭 Playwright (partial – ${{ needs.select-tests.outputs.test_groups }})
    runs-on: ubuntu-latest
    needs: select-tests
    if: |
      needs.select-tests.outputs.skip_playwright != 'true' &&
      needs.select-tests.outputs.full_suite != 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Jekyll server
        run: |
          bundle exec jekyll serve --port 4000 --detach
          for i in $(seq 1 30); do
            if curl -s http://localhost:4000/ > /dev/null; then break; fi
            sleep 1
          done
          curl -f http://localhost:4000/ || exit 1

      - name: Run Playwright (partial)
        id: playwright
        env:
          CI: true
          PLAYWRIGHT_GREP: ${{ needs.select-tests.outputs.playwright_grep }}
          TEST_GROUPS: ${{ needs.select-tests.outputs.test_groups }}
          FULL_SUITE: 'false'
          SELECTION_REASON: ${{ needs.select-tests.outputs.selection_reason }}
        run: npm run test:playwright
        continue-on-error: true

      - name: Generate quality report
        if: always()
        env:
          TEST_GROUPS: ${{ needs.select-tests.outputs.test_groups }}
          FULL_SUITE: 'false'
          SKIP_PLAYWRIGHT: 'false'
          SELECTION_REASON: ${{ needs.select-tests.outputs.selection_reason }}
        run: node scripts/generate-quality-report.js

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.json
          retention-days: 30

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-partial
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: 📊 Monitor healing effectiveness
        if: always()
        run: npm run monitor:healing || echo "⚠️ Monitoring collection failed (non-blocking)"
        continue-on-error: true

      - name: 🔍 Analyze test results
        if: always()
        run: npm run alert:system || echo "⚠️ Alert analysis failed (non-blocking)"
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Step 3 (full): Playwright — Shard 1 (Navigation + Mobile)
  # ---------------------------------------------------------------------------
  playwright-shard1:
    name: 🎭 Playwright Shard 1 – Navigation & Mobile
    runs-on: ubuntu-latest
    needs: select-tests
    if: |
      needs.select-tests.outputs.skip_playwright != 'true' &&
      needs.select-tests.outputs.full_suite == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Jekyll server
        run: |
          bundle exec jekyll serve --port 4000 --detach
          for i in $(seq 1 30); do
            if curl -s http://localhost:4000/ > /dev/null; then break; fi
            sleep 1
          done
          curl -f http://localhost:4000/ || exit 1

      - name: Run Playwright Shard 1
        env:
          CI: true
          PLAYWRIGHT_SHARD: '1/3'
          PLAYWRIGHT_GREP: '@REQ-NAV-01|@REQ-NAV-02'
          TEST_GROUPS: 'REQ-NAV-01,REQ-NAV-02'
          FULL_SUITE: 'true'
          SELECTION_REASON: ${{ needs.select-tests.outputs.selection_reason }}
        run: npm run test:playwright
        continue-on-error: true

      - name: Upload Playwright results (shard 1)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-shard1
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Step 3 (full): Playwright — Shard 2 (Content + Search + Links)
  # ---------------------------------------------------------------------------
  playwright-shard2:
    name: 🎭 Playwright Shard 2 – Content, Search & Links
    runs-on: ubuntu-latest
    needs: select-tests
    if: |
      needs.select-tests.outputs.skip_playwright != 'true' &&
      needs.select-tests.outputs.full_suite == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Jekyll server
        run: |
          bundle exec jekyll serve --port 4000 --detach
          for i in $(seq 1 30); do
            if curl -s http://localhost:4000/ > /dev/null; then break; fi
            sleep 1
          done
          curl -f http://localhost:4000/ || exit 1

      - name: Run Playwright Shard 2
        env:
          CI: true
          PLAYWRIGHT_SHARD: '2/3'
          PLAYWRIGHT_GREP: '@REQ-CONTENT-01|@REQ-CONTENT-02|@REQ-SEARCH-01|@REQ-LINKS-01'
          TEST_GROUPS: 'REQ-CONTENT-01,REQ-CONTENT-02,REQ-SEARCH-01,REQ-LINKS-01'
          FULL_SUITE: 'true'
          SELECTION_REASON: ${{ needs.select-tests.outputs.selection_reason }}
        run: npm run test:playwright
        continue-on-error: true

      - name: Upload Playwright results (shard 2)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-shard2
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Step 3 (full): Playwright — Shard 3 (Accessibility + Visual + Performance)
  # ---------------------------------------------------------------------------
  playwright-shard3:
    name: 🎭 Playwright Shard 3 – Accessibility, Visual & Performance
    runs-on: ubuntu-latest
    needs: select-tests
    if: |
      needs.select-tests.outputs.skip_playwright != 'true' &&
      needs.select-tests.outputs.full_suite == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Jekyll server
        run: |
          bundle exec jekyll serve --port 4000 --detach
          for i in $(seq 1 30); do
            if curl -s http://localhost:4000/ > /dev/null; then break; fi
            sleep 1
          done
          curl -f http://localhost:4000/ || exit 1

      - name: Run Playwright Shard 3
        env:
          CI: true
          PLAYWRIGHT_SHARD: '3/3'
          PLAYWRIGHT_GREP: '@REQ-A11Y-01|@REQ-A11Y-02|@REQ-VISUAL-01|@REQ-PERF-01'
          TEST_GROUPS: 'REQ-A11Y-01,REQ-A11Y-02,REQ-VISUAL-01,REQ-PERF-01'
          FULL_SUITE: 'true'
          SELECTION_REASON: ${{ needs.select-tests.outputs.selection_reason }}
        run: npm run test:playwright
        continue-on-error: true

      - name: Upload Playwright results (shard 3)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-shard3
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Step 4: Quality report (aggregates full-suite shard results)
  # ---------------------------------------------------------------------------
  quality-report:
    name: 📊 Quality Report
    runs-on: ubuntu-latest
    needs:
      - select-tests
      - playwright-shard1
      - playwright-shard2
      - playwright-shard3
    if: |
      always() &&
      needs.select-tests.outputs.skip_playwright != 'true' &&
      needs.select-tests.outputs.full_suite == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download shard 1 results
        uses: actions/download-artifact@v4
        with:
          name: playwright-results-shard1
          path: test-results-shard1/
        continue-on-error: true

      - name: Download shard 2 results
        uses: actions/download-artifact@v4
        with:
          name: playwright-results-shard2
          path: test-results-shard2/
        continue-on-error: true

      - name: Download shard 3 results
        uses: actions/download-artifact@v4
        with:
          name: playwright-results-shard3
          path: test-results-shard3/
        continue-on-error: true

      - name: Merge shard results
        run: |
          mkdir -p test-results
          # Use the first available results.json as primary (a full merge would
          # require the Playwright merge-reports feature; use shard1 as baseline)
          for shard in 1 2 3; do
            src="test-results-shard${shard}/results.json"
            if [ -f "$src" ]; then
              echo "Found results for shard ${shard}"
              cp "$src" "test-results/results-shard${shard}.json"
            fi
          done
          # Use shard1 result as the primary results.json for report generation
          # (full merge is handled by Playwright's built-in merge command if available)
          if [ -f "test-results/results-shard1.json" ]; then
            cp "test-results/results-shard1.json" "test-results/results.json"
          fi

      - name: Generate quality report
        env:
          TEST_GROUPS: ${{ needs.select-tests.outputs.test_groups }}
          FULL_SUITE: 'true'
          SKIP_PLAYWRIGHT: 'false'
          SELECTION_REASON: ${{ needs.select-tests.outputs.selection_reason }}
        run: node scripts/generate-quality-report.js

      - name: Upload quality report artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.json
          retention-days: 30

      - name: 📊 Monitor healing effectiveness
        if: always()
        run: npm run monitor:healing || echo "⚠️ Monitoring collection failed (non-blocking)"
        continue-on-error: true

      - name: 🔍 Analyze test results
        if: always()
        run: npm run alert:system || echo "⚠️ Alert analysis failed (non-blocking)"
        continue-on-error: true

      - name: Upload healing monitoring data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healing-monitoring-data
          path: |
            healing-metrics/
            healing-reports/
            healing-alerts/
          retention-days: 30
