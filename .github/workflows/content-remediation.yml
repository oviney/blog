name: Content Remediation

on:
  workflow_run:
    workflows: ["Content Review"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  remediate:
    name: Generate improvement action plans
    runs-on: ubuntu-latest
    # Only run if content-review succeeded (or if manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate remediation queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/content-remediation.js

      - name: Commit updated queue
        run: |
          git config --local user.email "content-remediation@github.com"
          git config --local user.name "Content Remediation"
          git add content-remediation-queue.json
          if ! git diff --staged --quiet; then
            git commit -m "📋 remediation: refresh improvement queue ($(date -u +%Y-%m-%d))

            - Generated by content-remediation.yml
            - Workflow run: ${{ github.run_id }}

            Co-Authored-By: Content Remediation <content-remediation@github.com>"
            git push
          else
            echo "No changes to remediation queue — skipping commit"
          fi
