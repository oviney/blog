name: Content Remediation

on:
  workflow_run:
    workflows: ["Content Review"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  remediate:
    name: Generate improvement action plans
    runs-on: ubuntu-latest
    # Only run if content-review succeeded (or if manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download content-review results artifact
        uses: actions/download-artifact@v8
        with:
          name: content-review-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Generate remediation queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/content-remediation.js

      - name: Upload queue as artifact
        uses: actions/upload-artifact@v7
        with:
          name: remediation-queue
          path: content-remediation-queue.json
          retention-days: 7
