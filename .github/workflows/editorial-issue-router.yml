name: Editorial Issue Router

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  assign-copilot:
    name: Assign Copilot to Editorial Issues
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'agent:editorial-chief')
    steps:
      - name: Assign @copilot
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['copilot[bot]'],
            });
