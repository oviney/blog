name: Auto-Regression Suite Growth

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to generate regression test for'
        required: true
        type: string

jobs:
  generate-regression-test:
    name: Generate Playwright Regression Test
    runs-on: ubuntu-latest
    # Only trigger when both "bug" and "production" labels are present
    if: >
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'production' &&
       contains(toJson(github.event.issue.labels), '"bug"')) ||
      github.event_name == 'workflow_dispatch'

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve issue details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            let issueNumber, issueTitle, issueBody;

            if (context.eventName === 'workflow_dispatch') {
              const inputNum = '${{ github.event.inputs.issue_number }}';
              issueNumber = parseInt(inputNum);
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              issueTitle = issue.title;
              issueBody  = issue.body || '';
            } else {
              issueNumber = context.issue.number;
              issueTitle  = context.payload.issue.title;
              issueBody   = context.payload.issue.body || '';
            }

            // Write body to a temp file to avoid shell quoting issues
            const fs = require('fs');
            fs.writeFileSync('/tmp/issue_body.txt', issueBody);

            core.setOutput('number', issueNumber);
            core.setOutput('title',  issueTitle);

      - name: Generate regression test skeleton
        id: generate
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        run: |
          RESULT=$(python3 scripts/generate-regression-test.py \
            --issue-number "${ISSUE_NUMBER}" \
            --title "${ISSUE_TITLE}" \
            --body "$(cat /tmp/issue_body.txt)" \
            --output-dir tests/playwright-agents/regression \
            --json-output)

          echo "result=${RESULT}" >> "$GITHUB_OUTPUT"
          TEST_FILE=$(echo "${RESULT}" | python3 -c "import json,sys; print(json.load(sys.stdin)['test_file'])")
          echo "test_file=${TEST_FILE}" >> "$GITHUB_OUTPUT"
          echo "Generated regression test: ${TEST_FILE}"
          echo ""
          cat "${TEST_FILE}"

      - name: Create branch and open draft PR
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          TEST_FILE: ${{ steps.generate.outputs.test_file }}
          RESULT: ${{ steps.generate.outputs.result }}
        run: |
          BRANCH="regression/issue-${ISSUE_NUMBER}-auto-test"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}" 2>/dev/null || git checkout "${BRANCH}"
          git merge --ff-only main 2>/dev/null || true

          REQ_IDS=$(echo "${RESULT}" | python3 -c "import json,sys; print(', '.join(json.load(sys.stdin)['req_ids']))")

          git add "${TEST_FILE}"
          git commit -m "test(regression): auto-generated regression test for issue #${ISSUE_NUMBER} — ${ISSUE_TITLE}"

          git push origin "${BRANCH}" --force

          PR_BODY="Auto-generated regression test for bug #${ISSUE_NUMBER}: ${ISSUE_TITLE}.\n\nRequirements: ${REQ_IDS}\nTest file: ${TEST_FILE}\n\nReview checklist:\n- Verify test reproduces the bug\n- Confirm it fails before fix, passes after\n- Replace skeleton assertions with specific checks\n\nHuman review required before merging.\n\nCloses #${ISSUE_NUMBER}"

          PR_URL=$(gh pr create \
            --title "test(regression): auto-generated test for #${ISSUE_NUMBER}" \
            --body "${PR_BODY}" \
            --draft \
            --base main \
            --head "${BRANCH}")

          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          PR_NUMBER=$(echo "${PR_URL}" | grep -oE '[0-9]+$' || echo "")
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Update defect-log.json with PR reference
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          TEST_FILE: ${{ steps.generate.outputs.test_file }}
        run: |
          git checkout main

          python3 scripts/update-defect-log.py \
            --issue-number "${ISSUE_NUMBER}" \
            --pr-number "${PR_NUMBER}" \
            --test-file "${TEST_FILE}"

          git add docs/defect-log.json
          if git diff --cached --quiet; then
            echo "No changes to defect-log.json"
          else
            git commit -m "chore: update defect-log regression PR for issue #${ISSUE_NUMBER}"
            git push
          fi

      - name: Comment on bug issue with PR link
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl    = '${{ steps.pr.outputs.pr_url }}';
            const testFile = '${{ steps.generate.outputs.test_file }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.number }},
              body: [
                'Auto-Regression Test Generated',
                '',
                'A draft PR has been opened with an auto-generated regression test:',
                'PR: ' + prUrl,
                'Test file: `' + testFile + '`',
                '',
                'Next steps:',
                '1. Review the draft PR -- verify the test reproduces the bug',
                '2. Confirm it fails before the fix and passes after',
                '3. Replace skeleton assertions with specific checks',
                '4. Approve and merge to add this regression test to the suite',
                '',
                'This test was auto-generated from the issue body. Human review is required before merging.'
              ].join('\n')
            });
