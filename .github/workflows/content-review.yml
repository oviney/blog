name: Content Review

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  review:
    name: Score editorial quality of all posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site (validates posts + images)
        run: bundle exec jekyll build --config _config.yml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run content review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/content-review.js --json
          echo "Review complete. JSON results saved to content-review-results.json"

      - name: Commit results JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content-review-results.json
          git diff --staged --quiet || git commit -m "chore: update content-review-results.json [skip ci]"
          git push origin main
