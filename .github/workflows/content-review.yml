name: 📋 Content Review

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print report but do not create a GitHub issue'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  review:
    name: Score articles against editorial standards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Run content review
        id: review
        run: |
          node scripts/content-review.js > /tmp/review-report.md
          echo "Report preview (first 40 lines):"
          head -40 /tmp/review-report.md

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: content-review-report
          path: content-review-report.md
          retention-days: 30

      - name: Create GitHub issue with report
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/review-report.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);

            // Close any previous open content-review issues to avoid clutter
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'content-review',
              per_page: 20,
            });
            for (const issue of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              console.log(`Closed previous content-review issue #${issue.number}`);
            }

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'content-review',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'content-review',
                color: '0075ca',
                description: 'Automated content quality review report',
              });
            }

            // Truncate report to stay within GitHub issue body limits (65 536 chars)
            const MAX = 65000;
            const body = report.length > MAX
              ? report.slice(0, MAX) + '\n\n…_(report truncated)_'
              : report;

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Content Review Report — ${today}`,
              body,
              labels: ['content-review'],
            });

            console.log(`Created issue #${issue.number}: ${issue.html_url}`);
