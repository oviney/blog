name: Agent PR Evaluation

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  eval:
    name: Evaluate Agent PR
    if: contains(github.event.pull_request.user.login, 'copilot')
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to enable auto-merge
      pull-requests: write
      issues: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Get changed files
      id: files
      run: |
        FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only)
        echo "changed<<EOF" >> $GITHUB_OUTPUT
        echo "$FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "count=$(echo "$FILES" | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Get issue labels
      id: labels
      run: |
        # Extract issue number from PR body
        ISSUE_NUM=$(echo "${{ github.event.pull_request.body }}" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
        if [ -n "$ISSUE_NUM" ]; then
          LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '.labels[].name' 2>/dev/null | tr '\n' ',')
          echo "issue=$ISSUE_NUM" >> $GITHUB_OUTPUT
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
        else
          echo "issue=" >> $GITHUB_OUTPUT
          echo "labels=" >> $GITHUB_OUTPUT
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build validation
      id: build
      run: |
        if bundle exec jekyll build 2>&1; then
          echo "status=pass" >> $GITHUB_OUTPUT
        else
          echo "status=fail" >> $GITHUB_OUTPUT
        fi

    - name: Scope check
      id: scope
      run: |
        LABELS="${{ steps.labels.outputs.labels }}"
        FILES="${{ steps.files.outputs.changed }}"
        VIOLATIONS=""

        # Define domain boundaries
        # Creative Director: _sass/, _layouts/, assets/css/, assets/images/
        # QA Gatekeeper: .github/workflows/, tests/, scripts/, playwright.config.ts
        # Editorial Chief: _posts/, _drafts/, docs/, *.md (content)
        # Audience Researcher: docs/, references/, *.md (research synthesis)

        if echo "$LABELS" | grep -q "agent:creative-director"; then
          # Creative Director should NOT touch CI, tests, or config
          if echo "$FILES" | grep -qE "^(\.github/workflows/|tests/|scripts/|_config\.yml)"; then
            VIOLATIONS="Creative Director modified CI/test/config files"
          fi
        fi

        if echo "$LABELS" | grep -q "agent:editorial-chief"; then
          # Editorial Chief should NOT touch CSS, layouts, or CI
          if echo "$FILES" | grep -qE "^(_sass/|_layouts/|\.github/workflows/|tests/)"; then
            VIOLATIONS="Editorial Chief modified design/CI/test files"
          fi
        fi

        if echo "$LABELS" | grep -q "agent:qa-gatekeeper"; then
          # QA Gatekeeper should NOT touch content or design
          if echo "$FILES" | grep -qE "^(_posts/|_sass/|_layouts/)"; then
            VIOLATIONS="QA Gatekeeper modified content/design files"
          fi
        fi

        if echo "$LABELS" | grep -q "agent:audience-researcher"; then
          # Audience Researcher should stay in research/docs surfaces
          if echo "$FILES" | grep -qE "^(_posts/|_drafts/|_sass/|_layouts/|\.github/workflows/|tests/|scripts/|_config\.yml)"; then
            VIOLATIONS="Audience Researcher modified implementation files outside research scope"
          fi
        fi

        if [ -n "$VIOLATIONS" ]; then
          echo "status=fail" >> $GITHUB_OUTPUT
          echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
        else
          echo "status=pass" >> $GITHUB_OUTPUT
          echo "violations=" >> $GITHUB_OUTPUT
        fi

    - name: File count check
      id: filecount
      run: |
        COUNT=${{ steps.files.outputs.count }}
        if [ "$COUNT" -gt 30 ]; then
          echo "status=warn" >> $GITHUB_OUTPUT
          echo "message=PR touches $COUNT files — unusually large for an agent PR" >> $GITHUB_OUTPUT
        else
          echo "status=pass" >> $GITHUB_OUTPUT
          echo "message=$COUNT files changed" >> $GITHUB_OUTPUT
        fi

    - name: Classify PR risk
      # Risk classification determines how much human oversight is required:
      #
      # LOW:    Only docs/markdown changes (docs/, *.md, root prose files)
      #         These are the safest — auto-merge enabled once CI passes.
      #
      # MEDIUM: Content or test changes (_posts/, _drafts/, tests/, specs/, scripts/)
      #         These affect the public site or quality gates, so standard review applies.
      #
      # HIGH:   Layout/CSS/CI/config changes (_sass/, _layouts/, .github/workflows/,
      #         _config.yml, assets/)
      #         These have wide blast radius — require explicit senior human approval.
      #
      # When a PR touches files from multiple tiers, the highest tier wins.
      id: risk
      run: |
        FILES="${{ steps.files.outputs.changed }}"

        # High-risk check first (highest precedence)
        if echo "$FILES" | grep -qE "^(_sass/|_layouts/|\.github/workflows/|_config\.yml|assets/)"; then
          echo "tier=high" >> $GITHUB_OUTPUT
          echo "reason=Changes touch CSS/layout/CI/config files — wide blast radius" >> $GITHUB_OUTPUT

        # Medium-risk: content or test/script changes
        elif echo "$FILES" | grep -qE "^(_posts/|_drafts/|tests/|specs/|scripts/)"; then
          echo "tier=medium" >> $GITHUB_OUTPUT
          echo "reason=Changes touch content or test/script files" >> $GITHUB_OUTPUT

        # Low-risk: only docs/markdown files
        else
          NON_DOC=$(echo "$FILES" | grep -vE "(^docs/|\.md$|\.txt$|^README|^CHANGELOG|^CNAME|^robots\.txt$)" || true)
          if [ -n "$NON_DOC" ]; then
            echo "tier=medium" >> $GITHUB_OUTPUT
            echo "reason=Unclassified files present — defaulting to standard review" >> $GITHUB_OUTPUT
          else
            echo "tier=low" >> $GITHUB_OUTPUT
            echo "reason=Only documentation/markdown changes detected" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Ensure risk labels exist
      uses: actions/github-script@v9
      with:
        script: |
          const labels = [
            { name: 'risk:low',    color: '0e8a16', description: 'Only docs/markdown — safe to auto-merge' },
            { name: 'risk:medium', color: 'e4a11b', description: 'Content/test changes — standard review' },
            { name: 'risk:high',   color: 'b60205', description: 'Layout/CI/config changes — senior review required' },
          ];
          for (const label of labels) {
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name });
            } catch {
              await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label });
            }
          }

    - name: Apply risk label
      uses: actions/github-script@v9
      with:
        script: |
          const tier = '${{ steps.risk.outputs.tier }}';
          // Remove any stale risk labels, then apply current tier
          const existing = await github.rest.issues.listLabelsOnIssue({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          for (const label of existing.data) {
            if (label.name.startsWith('risk:')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: label.name,
              });
            }
          }
          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            labels: [`risk:${tier}`],
          });

    - name: Post eval report
      uses: actions/github-script@v9
      with:
        script: |
          const build = '${{ steps.build.outputs.status }}';
          const scope = '${{ steps.scope.outputs.status }}';
          const scopeViolations = '${{ steps.scope.outputs.violations }}';
          const fileCount = '${{ steps.filecount.outputs.status }}';
          const fileMsg = '${{ steps.filecount.outputs.message }}';
          const issueNum = '${{ steps.labels.outputs.issue }}';
          const labels = '${{ steps.labels.outputs.labels }}';
          const changedCount = '${{ steps.files.outputs.count }}';
          const riskTier = '${{ steps.risk.outputs.tier }}';
          const riskReason = '${{ steps.risk.outputs.reason }}';

          const checks = [
            { name: 'Jekyll Build', status: build, detail: build === 'pass' ? 'Site builds successfully' : 'BUILD FAILED' },
            { name: 'Agent Scope', status: scope, detail: scope === 'pass' ? 'Changes within agent domain' : scopeViolations },
            { name: 'PR Size', status: fileCount, detail: fileMsg },
            { name: 'Issue Link', status: issueNum ? 'pass' : 'warn', detail: issueNum ? `References #${issueNum}` : 'No issue referenced' },
          ];

          const allPass = checks.every(c => c.status === 'pass');
          const hasFailure = checks.some(c => c.status === 'fail');

          // Risk tier badge and guidance
          const tierBadge = { low: '🟢 LOW', medium: '🟡 MEDIUM', high: '🔴 HIGH' }[riskTier] || riskTier;
          const tierGuidance = {
            low:    '✅ Auto-merge enabled — will merge automatically once all CI checks pass.',
            medium: '👀 Standard review required — a human must approve before merge.',
            high:   '🛑 Senior review required — explicit human approval needed before merge.',
          }[riskTier] || '';

          let body = `## Agent PR Evaluation\n\n`;
          body += `### Risk Tier: ${tierBadge}\n`;
          body += `**Reason:** ${riskReason}\n`;
          body += `**Action:** ${tierGuidance}\n\n`;
          body += `| Check | Status | Detail |\n|-------|--------|--------|\n`;
          checks.forEach(c => {
            const icon = c.status === 'pass' ? '✅' : c.status === 'warn' ? '⚠️' : '❌';
            body += `| ${c.name} | ${icon} ${c.status} | ${c.detail} |\n`;
          });

          body += `\n**Agent labels:** ${labels || 'none'}\n`;
          body += `**Files changed:** ${changedCount}\n\n`;

          if (hasFailure) {
            body += `### ❌ Evaluation Failed\nThis PR has scope violations or build failures. Review required before merge.\n`;
          } else if (allPass) {
            body += `### ✅ Evaluation Passed\nAll checks passed. Ready for human review.\n`;
          } else {
            body += `### ⚠️ Evaluation Passed with Warnings\nNo failures, but review the warnings above.\n`;
          }

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: body
          });

    - name: Enable auto-merge for low-risk PRs
      # Low-risk PRs (docs/markdown only) are safe to auto-merge once all CI
      # status checks pass. Auto-merge requires the repository setting
      # "Allow auto-merge" to be enabled and branch protection rules with
      # required status checks configured.
      if: steps.risk.outputs.tier == 'low' && steps.build.outputs.status == 'pass' && steps.scope.outputs.status == 'pass'
      uses: actions/github-script@v9
      with:
        script: |
          try {
            await github.graphql(`
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest { autoMergeRequest { enabledAt } }
                }
              }
            `, { pullRequestId: context.payload.pull_request.node_id });
            console.log('✅ Auto-merge enabled via GraphQL');
          } catch (e) {
            console.log(`⚠️ Auto-merge could not be enabled: ${e.message}`);
            console.log('Ensure "Allow auto-merge" is turned on in repository settings.');
          }

    - name: Request senior review for high-risk PRs
      # High-risk PRs must have explicit human sign-off before merge.
      # We request a review from the repository owner and add a blocking comment.
      if: steps.risk.outputs.tier == 'high'
      uses: actions/github-script@v9
      with:
        script: |
          // Request a review from the repository owner
          try {
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: [context.repo.owner],
            });
          } catch (e) {
            console.log(`Could not auto-request reviewer: ${e.message}`);
          }

    - name: Fail on violations
      if: steps.build.outputs.status == 'fail' || steps.scope.outputs.status == 'fail'
      run: |
        echo "❌ Agent eval failed"
        echo "Build: ${{ steps.build.outputs.status }}"
        echo "Scope: ${{ steps.scope.outputs.status }} - ${{ steps.scope.outputs.violations }}"
        exit 1
