name: Test Jekyll Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    # types: include `labeled`/`unlabeled` so the scope guard re-fires
    # when `governance-update` (or any label-driven scope skip) is
    # added or removed mid-PR. Without these, the workflow only observes
    # the pre-label state and the close-reopen workaround is required
    # (which desynced PR #935 → forced PR #936 on 2026-05-12). See #937.
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      
      - name: Build Jekyll site
        run: bundle exec jekyll build --verbose
      
      - name: Validate HTML and internal links
        run: |
          # htmlproofer validates against the built _site/, resolving every
          # internal link to its actual generated path. This catches real
          # broken links (where Jekyll's URL rewriting produces no matching
          # _site/ file) — including cases where post front-matter `date:`
          # overrides shift the URL away from the filename's date prefix.
          gem install html-proofer
          htmlproofer ./_site \
            --disable-external \
            --allow-hash-href \
            --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/,/^mailto:/" \
            --ignore-status-codes "999"

      - name: Validate YAML front matter
        run: |
          echo "Validating YAML front matter..."
          for file in _posts/*.md _posts/*.markdown; do
            if [ -f "$file" ]; then
              if ! head -1 "$file" | grep -q "^---$"; then
                echo "❌ Missing front matter in $file"
                exit 1
              fi
              if ! grep -q "^title:" "$file"; then
                echo "❌ Missing 'title' in $file"
                exit 1
              fi
              if ! grep -q "^date:" "$file"; then
                echo "❌ Missing 'date' in $file"
                exit 1
              fi
            fi
          done
          echo "✅ All YAML front matter valid"
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: _site/
          retention-days: 7

  validate-editorial:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate post front matter and image paths
        run: bash scripts/validate-posts.sh --all

      - name: Validate post editorial quality (errors block, warnings advisory)
        run: |
          # validate-post-quality.sh exit codes: 0 = clean, 1 = ERROR, 2 = warnings only.
          # Gate on ERRORs only; warnings are surfaced but never block the merge.
          set +e
          bash scripts/validate-post-quality.sh --all
          code=$?
          set -e
          if [ "$code" -eq 1 ]; then
            echo "::error::Post editorial quality check found blocking errors (see log above)."
            exit 1
          fi
          if [ "$code" -eq 2 ]; then
            echo "::warning::Post editorial quality passed with non-blocking warnings (see log above)."
          fi
          exit 0

  check-agent-scope:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check agent scope compliance
        run: bash scripts/check-pr-scope.sh
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}

      - name: Run scope-guard fixture tests
        run: bash tests/scope-guard.sh

      - name: Check agent memory-discipline guardrails
        run: bash scripts/check-agent-memory-discipline.sh
