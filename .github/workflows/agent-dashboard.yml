name: Agent Observability Dashboard

on:
  schedule:
    # Every Monday at 09:30 UTC — after the activity report (09:00) has run
    - cron: "30 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read
  actions: read

jobs:
  build-dashboard:
    name: Refresh agent dashboard data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build agents-data.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/agent-dashboard-data.js

      - name: Create pull request for updated data
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            📊 dashboard: refresh agent observability data

            - Generated by agent-dashboard.yml
            - Workflow run: ${{ github.run_id }}

            Co-Authored-By: Agent Dashboard <agent-dashboard@github.com>
          author: Agent Dashboard <agent-dashboard@github.com>
          committer: Agent Dashboard <agent-dashboard@github.com>
          branch: automation/agent-dashboard-data
          delete-branch: true
          title: "📊 dashboard: refresh agent observability data"
          body: |
            Automated dashboard data refresh generated by `agent-dashboard.yml`.

            - Source workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Updates: `dashboard/agents-data.json`

            This PR avoids pushing directly to the protected `main` branch.
