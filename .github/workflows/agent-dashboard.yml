name: Agent Observability Dashboard

on:
  schedule:
    # Every Monday at 09:30 UTC — after the activity report (09:00) has run
    - cron: "30 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  issues: read
  actions: read

jobs:
  build-dashboard:
    name: Refresh agent dashboard data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build agents-data.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/agent-dashboard-data.js

      - name: Commit updated data
        run: |
          git config --local user.email "agent-dashboard@github.com"
          git config --local user.name "Agent Dashboard"
          git add dashboard/agents-data.json
          if ! git diff --staged --quiet; then
            git commit -m "📊 dashboard: refresh agent observability data

            - Generated by agent-dashboard.yml
            - Workflow run: ${{ github.run_id }}

            Co-Authored-By: Agent Dashboard <agent-dashboard@github.com>"
            git push
          else
            echo "No changes to dashboard data — skipping commit"
          fi
